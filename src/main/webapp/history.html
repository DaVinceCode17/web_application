<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Order History - Cyron's Laundry</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        html, body { height: 100%; min-height: 100vh; }
        body { background: #d4edff; display: flex; justify-content: center; align-items: flex-start; padding: 0; margin: 0; }
        .main-wrapper { width: 100%; max-width: 700px; margin: 0 auto; padding: 20px; display: flex; flex-direction: column; min-height: 100vh; }
        
        .top-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; flex-wrap: wrap; gap: 10px; width: 100%; background: transparent; flex-shrink: 0; padding: 0 4px; }
        .top-bar .user-info { display: flex; align-items: center; gap: 10px; font-size: 1rem; font-weight: 600; color: #0f2b3a; padding: 6px 12px; border-radius: 30px; background: rgba(255,255,255,0.6); backdrop-filter: blur(4px); }
        .top-bar .user-info i { font-size: 1.6rem; color: #0f2b3a; }
        .back-btn { font-size: 0.75rem; color: #0f2b3a; text-decoration: none; background: rgba(255,255,255,0.6); backdrop-filter: blur(4px); padding: 6px 14px; border-radius: 30px; font-weight: 600; border: none; cursor: pointer; }
        .back-btn:hover { background: rgba(255,255,255,0.9); }
        
        .page-title { text-align: center; margin-bottom: 16px; flex-shrink: 0; padding: 0 4px; }
        .page-title h2 { color: #0f2b3a; font-size: 1.6rem; font-weight: 700; }
        .page-title .sub-title { color: #0f2b3a; font-size: 0.9rem; opacity: 0.8; }
        
        .container { width: 100%; background: white; border-radius: 30px; padding: 24px 20px 20px 20px; box-shadow: 0 20px 60px rgba(0,0,0,0.10); flex: 1; display: flex; flex-direction: column; }
        
        .table-wrap { overflow-x: auto; margin-top: 10px; flex: 1; }
        table { width: 100%; border-collapse: collapse; font-size: 0.8rem; }
        th, td { padding: 10px 12px; border: 1px solid #e8eef2; text-align: left; }
        th { background: #eef3f7; font-weight: 600; color: #0f2b3a; }
        td { background: white; }
        .badge { padding: 3px 12px; border-radius: 40px; font-size: 0.65rem; font-weight: 600; color: white; text-transform: capitalize; }
        .badge.claimed { background: #2e7d32; }
        .empty-state { text-align: center; color: #6f8fa2; padding: 30px 0; font-size: 0.9rem; }

        @media (max-width: 700px) { .main-wrapper { max-width: 100%; padding: 16px; margin: 0; } }
        @media (max-width: 600px) {
            body { padding: 0; align-items: flex-start; }
            .main-wrapper { padding: 12px; margin-top: 0; }
            .container { padding: 18px 14px; border-radius: 24px; }
            .top-bar .user-info { font-size: 0.9rem; padding: 4px 10px; }
            .top-bar .user-info i { font-size: 1.3rem; }
            .page-title h2 { font-size: 1.3rem; }
            table { font-size: 0.7rem; }
            th, td { padding: 6px 8px; }
        }
        @media (max-width: 450px) {
            .main-wrapper { padding: 8px; }
            .container { padding: 14px 10px; border-radius: 20px; }
            .top-bar .user-info { font-size: 0.8rem; padding: 4px 8px; }
            .top-bar .user-info i { font-size: 1.1rem; }
            .back-btn { font-size: 0.65rem; padding: 4px 10px; }
            .page-title h2 { font-size: 1.1rem; }
            table { font-size: 0.65rem; }
            th, td { padding: 4px 6px; }
        }
    </style>
</head>
<body>

    <div class="main-wrapper">

        <div class="top-bar">
            <div class="user-info">
                <i class="fas fa-user-circle"></i>
                <span id="userNameDisplay">Customer</span>
            </div>
            <a href="customer.html" class="back-btn"><i class="fas fa-arrow-left"></i> Back</a>
        </div>

        <div class="page-title">
            <h2>📜 Order History</h2>
            <p class="sub-title">Your claimed orders</p>
        </div>

        <div class="container">
            <div class="table-wrap">
                <table>
                    <thead>
                        <tr>
                            <th>Order</th>
                            <th>Services</th>
                            <th>Type</th>
                            <th>Status</th>
                            <th>Date</th>
                        </tr>
                    </thead>
                    <tbody id="historyTableBody">
                        <tr><td colspan="5" class="empty-state">Loading...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>

    </div>

    <script>
        const customerId = localStorage.getItem('current_customer_id');
        if (!customerId) { window.location.href = 'login.html'; }

        async function loadUser() {
            try {
                const response = await fetch('/api/laundry/customer/' + customerId);
                const data = await response.json();
                if (data.success) {
                    document.getElementById('userNameDisplay').textContent = data.customer.firstName + ' ' + data.customer.lastName;
                }
            } catch (error) {
                console.error('Error loading user:', error);
                document.getElementById('userNameDisplay').textContent = 'Customer';
            }
        }

        async function loadHistory() {
            const tbody = document.getElementById('historyTableBody');
            try {
                const response = await fetch('/api/orders/customer/' + customerId);
                const data = await response.json();
                if (data.success && data.orders && data.orders.length > 0) {
                    const history = data.orders.filter(o => o.status === 'claimed' || o.status === 'delivered');
                    if (history.length === 0) {
                        tbody.innerHTML = '<tr><td colspan="5" class="empty-state">No claimed orders yet.</td></tr>';
                        return;
                    }
                    let html = '';
                    history.forEach(o => {
                        const serviceTypeLabel = o.serviceType === 'dropoff' ? 'Drop-off' : 'Pick-up';
                        html += `
                            <tr>
                                <td><strong>#${o.queueNumber || 'N/A'}</strong></td>
                                <td>${o.services || 'N/A'}</td>
                                <td>${serviceTypeLabel}</td>
                                <td><span class="badge claimed">Claimed</span></td>
                                <td>${o.createdAt || 'N/A'}</td>
                            </tr>
                        `;
                    });
                    tbody.innerHTML = html;
                } else {
                    tbody.innerHTML = '<tr><td colspan="5" class="empty-state">No claimed orders yet.</td></tr>';
                }
            } catch (error) {
                console.error('Error loading history:', error);
                tbody.innerHTML = '<tr><td colspan="5" class="empty-state">Error loading history. Please try again.</td></tr>';
            }
        }

        loadUser();
        loadHistory();
    </script>

</body>
</html>
