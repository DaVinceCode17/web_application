<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login - Cyron's Laundry</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { min-height: 100vh; background: #d4edff; display: flex; justify-content: center; align-items: center; padding: 40px 20px; }
        .wrapper { width: 100%; max-width: 700px; display: flex; flex-direction: column; align-items: center; text-align: center; }
        .logo-outer { background: white; width: 150px; height: 150px; border-radius: 50%; display: flex; align-items: center; justify-content: center; box-shadow: 0 10px 30px rgba(0,0,0,0.10); margin-bottom: 20px; }
        .logo-outer img { width: 150px; height: 150px; object-fit: contain; border-radius: 50%; }
        .shop-name { font-size: 2.5rem; font-weight: 700; color: #0f2b3a; margin-top: -30px; }
        .shop-name span { color: #1f6f8a; }
        .tagline { color: #0f2b3a; font-size: 1.1rem; margin-top: -10px; margin-bottom: 40px; opacity: 0.8; }
        .form-card { width: 85%; max-width: 85%; background: white; border-radius: 20px; padding: 30px 24px; border: 1px solid #e8eef2; box-shadow: 0 10px 30px rgba(0,0,0,0.08); margin: 0 auto; }
        .form-card h1 { font-size: 28px; color: #0f2b3a; margin-bottom: 10px; }
        .form-group { margin-bottom: 14px; text-align: left; }
        .form-group label { display: block; font-weight: 600; color: #0f2b3a; font-size: 0.85rem; margin-bottom: 4px; }
        .form-group input { width: 100%; padding: 12px 16px; border-radius: 50px; border: 1px solid #dce6ed; font-size: 0.95rem; background: white; transition: 0.2s; }
        .form-group input:focus { border-color: #1f6f8a; outline: none; box-shadow: 0 0 0 3px rgba(31,111,138,0.1); }
        .form-actions { display: flex; gap: 12px; margin-top: 20px; }
        .form-actions .btn { flex: 1; padding: 14px 16px; border: none; border-radius: 60px; font-size: 1rem; font-weight: 600; cursor: pointer; text-align: center; text-decoration: none; transition: 0.25s; }
        .btn-danger { background: #b8860b; color: white; }
        .btn-danger:hover { background: #9e7309; }
        .btn-primary { background: #0f2b3a; color: white; box-shadow: 0 4px 16px rgba(15,43,58,0.2); }
        .btn-primary:hover { background: #1a3f52; box-shadow: 0 8px 24px rgba(15,43,58,0.25); }
        .register-link { margin-top: 16px; font-size: 0.85rem; color: #4f6f82; }
        .register-link a { color: #1f6f8a; font-weight: 600; text-decoration: none; }
        .notification { padding: 12px 16px; border-radius: 12px; margin-bottom: 16px; font-size: 0.85rem; color: #0f2b3a; display: none; }
        .notification.show { display: block; }
        .notification.error { background: #FFEBEE; }
        .notification.success { background: #E8F5E9; }
        .footer-meta { margin-top: 30px; padding-top: 20px; font-size: 0.8rem; color: #0f2b3a; border-top: 1px solid rgba(255,255,255,0.4); width: 100%; opacity: 0.7; }

        @media (max-width: 600px) {
            body { padding: 20px; }
            .logo-outer { width: 120px; height: 120px; margin-bottom: 16px; }
            .logo-outer img { width: 120px; height: 120px; }
            .shop-name { font-size: 2rem; margin-top: -20px; }
            .tagline { font-size: 1rem; margin-bottom: 30px; }
            .form-card { width: 90%; max-width: 90%; padding: 24px 18px; }
            .form-actions { flex-direction: column; }
        }
        @media (max-width: 450px) {
            body { padding: 16px; }
            .logo-outer { width: 100px; height: 100px; margin-bottom: 12px; }
            .logo-outer img { width: 100px; height: 100px; }
            .shop-name { font-size: 1.6rem; margin-top: -15px; }
            .tagline { font-size: 0.9rem; margin-bottom: 20px; }
            .form-card { width: 100%; max-width: 100%; padding: 20px 14px; }
            .form-card h1 { font-size: 24px; }
            .form-group input { padding: 10px 14px; font-size: 0.9rem; }
        }
    </style>
</head>
<body>
    <div class="wrapper">
        <div class="logo-outer"><img src="laundry_logo.png" alt="Laundry Logo" /></div>
        <div class="shop-name">Cyron's <span>Laundry Shop</span></div>
        <div class="tagline">Clean · Fresh · Delivered</div>

        <div class="form-card">
            <h1>Sign In</h1>
            <div id="loginNotification" class="notification"></div>
            <div class="form-group">
                <label>Contact Number / Username</label>
                <input type="text" id="loginContact" placeholder="Enter your contact or username" />
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" id="loginPass" placeholder="Enter your password" />
            </div>
            <div class="form-actions">
                <a href="index.html" class="btn btn-danger">Cancel</a>
                <button class="btn btn-primary" id="loginBtn">Sign in</button>
            </div>
            <div class="register-link">Don't have an account? <a href="register.html">Register here</a></div>
        </div>

        <div class="footer-meta">
            <i class="fas fa-cloud-sun"></i> 30°C · Mostly cloudy
            <span style="margin:0 8px;">|</span>
            <i class="fas fa-clock"></i> <span id="clockDisplay"></span>
        </div>
    </div>

    <script>
        function updateClock() {
            const now = new Date();
            document.getElementById('clockDisplay').textContent = String(now.getHours()).padStart(2,'0') + ':' + String(now.getMinutes()).padStart(2,'0');
        }
        updateClock();
        setInterval(updateClock, 1000);

        document.getElementById('loginBtn').addEventListener('click', async function() {
            const contact = document.getElementById('loginContact').value.trim();
            const pass = document.getElementById('loginPass').value.trim();
            const notif = document.getElementById('loginNotification');

            if (!contact || !pass) {
                notif.className = 'notification show error';
                notif.innerHTML = '<i class="fas fa-exclamation-circle"></i> Please enter your credentials.';
                return;
            }

            try {
                const response = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ contact, password: pass })
                });
                const data = await response.json();

                if (data.success) {
                    notif.className = 'notification show success';
                    notif.innerHTML = '<i class="fas fa-check-circle"></i> Login successful! Redirecting...';
                    localStorage.setItem('current_customer_id', data.user.id);
                    localStorage.setItem('current_user_role', data.user.role);
                    setTimeout(() => {
                        window.location.href = data.user.role === 'admin' ? 'admin.html' : 'customer.html';
                    }, 800);
                } else {
                    notif.className = 'notification show error';
                    notif.innerHTML = '<i class="fas fa-exclamation-circle"></i> ' + data.message;
                }
            } catch (error) {
                notif.className = 'notification show error';
                notif.innerHTML = '<i class="fas fa-exclamation-circle"></i> Network error. Please try again.';
            }
        });

        window.onload = function() {
            const params = new URLSearchParams(window.location.search);
            if (params.get('registered') === 'true') {
                const notif = document.getElementById('loginNotification');
                notif.className = 'notification show success';
                notif.innerHTML = '<i class="fas fa-check-circle"></i> Registration successful! Please log in.';
            }
        };
    </script>
</body>
</html>
