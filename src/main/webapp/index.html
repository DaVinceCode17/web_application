<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cyron's Laundry Shop</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            min-height: 100vh;
            background: #d4edff;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 40px 20px;
        }

        .wrapper {
            width: 100%;
            max-width: 700px;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
        }

        .logo-outer {
            background: white;
            width: 150px;
            height: 150px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.10);
            margin-bottom: 120px;
        }

        .logo-outer img {
            width: 150px;
            height: 150px;
            object-fit: contain;
            border-radius: 50%;
        }

        .shop-name {
            font-size: 2.5rem;
            font-weight: 700;
            color: #0f2b3a;
            margin-top: -80px;
        }
        .shop-name span {
            color: #1f6f8a;
        }

        .tagline {
            color: #0f2b3a;
            font-size: 1.1rem;
            margin-top: -10px;
            margin-bottom: 120px;
            opacity: 0.8;
        }

        .btn-group {
            display: flex;
            flex-direction: column;
            gap: 16px;
            width: 100%;
            max-width: 70%;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            padding: 18px 28px;
            border: none;
            border-radius: 60px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            text-decoration: none;
            width: 100%;
            transition: 0.25s;
        }

        .btn-primary {
            background: #0f2b3a;
            color: white;
            box-shadow: 0 4px 16px rgba(15, 43, 58, 0.2);
        }
        .btn-primary:hover {
            background: #1a3f52;
            transform: translateY(-3px);
            box-shadow: 0 8px 24px rgba(15, 43, 58, 0.3);
        }

        .btn-secondary {
            background: #1f6f8a;
            color: white;
            box-shadow: 0 4px 16px rgba(31, 111, 138, 0.2);
        }
        .btn-secondary:hover {
            background: #185a72;
            transform: translateY(-3px);
            box-shadow: 0 8px 24px rgba(31, 111, 138, 0.3);
        }

        .btn-outline {
            background: rgba(255,255,255,0.7);
            color: #0f2b3a;
            border: 2px solid rgba(255,255,255,0.5);
            backdrop-filter: blur(4px);
        }
        .btn-outline:hover {
            background: white;
            transform: translateY(-3px);
        }

        .btn-row {
            display: flex;
            gap: 14px;
        }
        .btn-row .btn {
            flex: 1;
        }

        .footer-meta {
            margin-top: 35px;
            padding-top: 20px;
            font-size: 0.8rem;
            color: #0f2b3a;
            border-top: 1px solid rgba(255,255,255,0.4);
            width: 100%;
            opacity: 0.7;
        }

        @media (max-width: 600px) {
            body { padding: 20px; }
            .logo-outer { width: 120px; height: 120px; margin-bottom: 80px; }
            .logo-outer img { width: 120px; height: 120px; }
            .shop-name { font-size: 2rem; margin-top: -60px; }
            .tagline { font-size: 1rem; margin-bottom: 80px; }
            .btn-group { max-width: 80%; }
            .btn { padding: 16px 22px; font-size: 1rem; }
        }

        @media (max-width: 450px) {
            body { padding: 16px; }
            .logo-outer { width: 100px; height: 100px; margin-bottom: 60px; }
            .logo-outer img { width: 100px; height: 100px; }
            .shop-name { font-size: 1.6rem; margin-top: -40px; }
            .tagline { font-size: 0.9rem; margin-bottom: 60px; }
            .btn-group { max-width: 100%; }
            .btn { padding: 14px 18px; font-size: 0.9rem; gap: 10px; }
            .btn-row { flex-direction: column; gap: 10px; }
            .footer-meta { font-size: 0.7rem; margin-top: 25px; padding-top: 15px; }
        }

        @media (max-width: 380px) {
            .logo-outer { width: 80px; height: 80px; margin-bottom: 40px; }
            .logo-outer img { width: 80px; height: 80px; }
            .shop-name { font-size: 1.3rem; margin-top: -30px; }
            .tagline { margin-top: -4px; margin-bottom: 40px; }
            .btn { padding: 12px 14px; font-size: 0.8rem; }
        }
    </style>
</head>
<body>

    <div class="wrapper">
        <div class="logo-outer">
            <img src="laundry_logo.png" alt="Laundry Logo" />
        </div>
        <div class="shop-name">Cyron's <span>Laundry Shop</span></div>
        <div class="tagline">Clean · Fresh · Delivered</div>

        <div class="btn-group">
            <a href="login.html" class="btn btn-primary">
                <i class="fas fa-calendar-check"></i> Schedule Laundry Service
            </a>
            <div class="btn-row">
                <a href="register.html" class="btn btn-outline">
                    <i class="fas fa-user-plus"></i> Register
                </a>
                <a href="login.html" class="btn btn-secondary">
                    <i class="fas fa-sign-in-alt"></i> Sign In
                </a>
            </div>
        </div>

        <div class="footer-meta">
            <i class="fas fa-cloud-sun"></i> 30°C · Mostly cloudy
            <span style="margin:0 8px;">|</span>
            <i class="fas fa-clock"></i> <span id="clockDisplay"></span>
        </div>
    </div>

    <script>
        function updateClock() {
            const now = new Date();
            const h = String(now.getHours()).padStart(2, '0');
            const m = String(now.getMinutes()).padStart(2, '0');
            document.getElementById('clockDisplay').textContent = h + ':' + m;
        }
        updateClock();
        setInterval(updateClock, 1000);
    </script>

</body>
</html>
